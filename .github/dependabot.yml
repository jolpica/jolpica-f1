# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Dev dependency groups (must be listed before django-production to capture
      # django-dbml, django-debug-toolbar, and *stubs* packages first)
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "*stubs*"
          - "django-dbml"
          - "django-debug-toolbar"
          - "mypy*"
          - "pytest*"
          - "ruff"
          - "tqdm"
          - "prek"
          - "types-*"
          - "ipykernel"
      # Django production dependency groups
      django-production:
        applies-to: version-updates
        patterns:
          - "django*"
          - "djangorestframework"
          - "drf-*"
      # All other production dependencies
      other-production:
        applies-to: version-updates
        patterns:
          - "*"
      # All production security updates grouped together for high-priority review
      production-security:
        applies-to: security-updates
        patterns:
          - "*"
